apiVersion: v1
kind: Namespace
metadata:
  name: vllm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemotron-vllm
  namespace: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nemotron-vllm
  template:
    metadata:
      labels:
        app: nemotron-vllm
    spec:
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "present"
          effect: "NoSchedule"
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.17.1-cu130
          ports:
            - containerPort: 8000
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
            - name: VLLM_NVFP4_GEMM_BACKEND
              value: "marlin"
            - name: VLLM_ALLOW_LONG_MAX_MODEL_LEN
              value: "1"
            - name: VLLM_FLASHINFER_ALLREDUCE_BACKEND
              value: "trtllm"
          command: ["bash", "-lc"]
          args:
            - |
              vllm serve nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4 \
                --served-model-name nemotron-3-super \
                --host 0.0.0.0 \
                --port 8000 \
                --async-scheduling \
                --dtype auto \
                --kv-cache-dtype fp8 \
                --tensor-parallel-size 1 \
                --pipeline-parallel-size 1 \
                --data-parallel-size 1 \
                --trust-remote-code \
                --gpu-memory-utilization 0.90 \
                --enable-chunked-prefill \
                --max-num-seqs 4 \
                --max-model-len 394000 \
                --attention-backend TRITON_ATTN \
                --mamba_ssm_cache_dtype float32 \
                --moe-backend marlin
          resources:
            limits:
              cpu: "8"
              memory: "64Gi"
              nvidia.com/gpu: 1
            requests:
              cpu: "4"
              memory: "32Gi"
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: hf-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nemotron-vllm
  namespace: vllm
spec:
  selector:
    app: nemotron-vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
