apiVersion: v1
kind: Namespace
metadata:
  name: training
---
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: nemotron4b-healthcare-finetune
  namespace: training
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          schedulerName: volcano
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
          nodeSelector:
            accelerator: "nvidia"
          containers:
            - name: pytorch
              image: ${IMAGE_REGISTRY}/${IMAGE_REPO}/nemotron4b-finetune:latest
              imagePullPolicy: Always
              command: ["python", "/workspace/train.py"]
              env:
                - name: MODEL_ID
                  value: "nvidia/NVIDIA-Nemotron-3-Nano-4B-BF16"
                - name: MAX_STEPS
                  value: "200"
                - name: MAX_SEQ_LEN
                  value: "512"
                - name: BATCH_SIZE
                  value: "1"
                - name: GRAD_ACCUM
                  value: "8"
                - name: LR
                  value: "0.0002"
                - name: LOG_EVERY
                  value: "10"
                - name: MAX_SAMPLES
                  value: "20000"
                - name: HF_HUB_DISABLE_TELEMETRY
                  value: "1"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
              resources:
                limits:
                  cpu: "6"
                  memory: "32Gi"
                  nvidia.com/gpu: 1
                requests:
                  cpu: "4"
                  memory: "24Gi"
                  nvidia.com/gpu: 1
              volumeMounts:
                - name: hf-cache
                  mountPath: /root/.cache/huggingface
                - name: nvme-storage
                  mountPath: /mnt/nvme
          volumes:
            - name: hf-cache
              hostPath:
                path: /mnt/nvme/hf-cache
                type: DirectoryOrCreate
            - name: nvme-storage
              hostPath:
                path: /mnt/nvme
                type: DirectoryOrCreate
    Worker:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          schedulerName: volcano
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
          nodeSelector:
            accelerator: "nvidia"
          containers:
            - name: pytorch
              image: ${IMAGE_REGISTRY}/${IMAGE_REPO}/nemotron4b-finetune:latest
              imagePullPolicy: Always
              command: ["python", "/workspace/train.py"]
              env:
                - name: MODEL_ID
                  value: "nvidia/NVIDIA-Nemotron-3-Nano-4B-BF16"
                - name: MAX_STEPS
                  value: "200"
                - name: MAX_SEQ_LEN
                  value: "512"
                - name: BATCH_SIZE
                  value: "1"
                - name: GRAD_ACCUM
                  value: "8"
                - name: LR
                  value: "0.0002"
                - name: LOG_EVERY
                  value: "10"
                - name: MAX_SAMPLES
                  value: "20000"
                - name: HF_HUB_DISABLE_TELEMETRY
                  value: "1"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
              resources:
                limits:
                  cpu: "6"
                  memory: "32Gi"
                  nvidia.com/gpu: 1
                requests:
                  cpu: "4"
                  memory: "24Gi"
                  nvidia.com/gpu: 1
              volumeMounts:
                - name: hf-cache
                  mountPath: /root/.cache/huggingface
                - name: nvme-storage
                  mountPath: /mnt/nvme
          volumes:
            - name: hf-cache
              hostPath:
                path: /mnt/nvme/hf-cache
                type: DirectoryOrCreate
            - name: nvme-storage
              hostPath:
                path: /mnt/nvme
                type: DirectoryOrCreate
