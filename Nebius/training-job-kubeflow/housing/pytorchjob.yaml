apiVersion: v1
kind: Namespace
metadata:
  name: training
---
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: housing-price-train
  namespace: training
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          schedulerName: volcano
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
          nodeSelector:
            accelerator: "nvidia"
          containers:
            - name: pytorch
              image: ${IMAGE_REGISTRY}/${IMAGE_REPO}/housing-price-train:latest
              imagePullPolicy: Always
              command: ["python", "/workspace/train.py"]
              env:
                - name: EPOCHS
                  value: "20"
                - name: BATCH_SIZE
                  value: "256"
                - name: LR
                  value: "0.001"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
                - name: PUSHGATEWAY_URL
                  value: "http://prometheus-pushgateway.monitoring:9091"
                - name: JOB_NAME
                  value: "housing-price-train"
              resources:
                limits:
                  cpu: "4"
                  memory: "16Gi"
                  nvidia.com/gpu: 1
                requests:
                  cpu: "2"
                  memory: "8Gi"
                  nvidia.com/gpu: 1
              volumeMounts:
                - name: nvme-storage
                  mountPath: /mnt/nvme
          volumes:
            - name: nvme-storage
              hostPath:
                path: /mnt/nvme
                type: DirectoryOrCreate
    Worker:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          schedulerName: volcano
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
          nodeSelector:
            accelerator: "nvidia"
          containers:
            - name: pytorch
              image: ${IMAGE_REGISTRY}/${IMAGE_REPO}/housing-price-train:latest
              imagePullPolicy: Always
              command: ["python", "/workspace/train.py"]
              env:
                - name: EPOCHS
                  value: "20"
                - name: BATCH_SIZE
                  value: "256"
                - name: LR
                  value: "0.001"
                - name: NCCL_DEBUG
                  value: "INFO"
                - name: NCCL_SOCKET_IFNAME
                  value: "eth0"
              resources:
                limits:
                  cpu: "4"
                  memory: "16Gi"
                  nvidia.com/gpu: 1
                requests:
                  cpu: "2"
                  memory: "8Gi"
                  nvidia.com/gpu: 1
              volumeMounts:
                - name: nvme-storage
                  mountPath: /mnt/nvme
          volumes:
            - name: nvme-storage
              hostPath:
                path: /mnt/nvme
                type: DirectoryOrCreate
