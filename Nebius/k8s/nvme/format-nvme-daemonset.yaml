apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvme-format-mount
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: nvme-format-mount
  template:
    metadata:
      labels:
        app: nvme-format-mount
    spec:
      hostPID: true
      nodeSelector:
        accelerator: nvidia
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      initContainers:
        - name: format-and-mount
          image: ubuntu:24.04
          securityContext:
            privileged: true
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              MOUNT_PATH="/mnt/nvme"
              DEVICES=$(lsblk -dno NAME,TYPE | grep nvme | grep disk | awk '{print "/dev/"$1}' | grep -v nvme0n1 || true)
              if [ -z "$DEVICES" ]; then
                echo "No NVMe devices found (beyond boot disk). Creating ${MOUNT_PATH} as fallback directory."
                mkdir -p "${MOUNT_PATH}"
                chmod 1777 "${MOUNT_PATH}"
                exit 0
              fi
              DEVICE=$(echo "$DEVICES" | head -n1)
              echo "Found NVMe device: $DEVICE"
              if ! blkid "$DEVICE" | grep -q ext4; then
                echo "Formatting $DEVICE as ext4..."
                mkfs.ext4 -F "$DEVICE"
              fi
              mkdir -p "$MOUNT_PATH"
              if ! mountpoint -q "$MOUNT_PATH"; then
                mount "$DEVICE" "$MOUNT_PATH"
                chmod 1777 "$MOUNT_PATH"
                echo "Mounted $DEVICE at $MOUNT_PATH"
              else
                echo "$MOUNT_PATH already mounted"
              fi
          volumeMounts:
            - name: host-dev
              mountPath: /dev
            - name: host-mnt
              mountPath: /mnt
              mountPropagation: Bidirectional
      containers:
        - name: sleep
          image: busybox:1.36
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
      volumes:
        - name: host-dev
          hostPath:
            path: /dev
        - name: host-mnt
          hostPath:
            path: /mnt
