apiVersion: v1
kind: Namespace
metadata:
  name: training
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: housing-price-train-script
  namespace: training
data:
  train.py: |
    import os
    import time
    import numpy as np
    import torch
    import torch.distributed as dist
    from torch import nn
    from torch.utils.data import Dataset, DataLoader, DistributedSampler
    from datasets import load_dataset

    FEATURE_COLS = [
        "MedInc",
        "HouseAge",
        "AveRooms",
        "AveBedrms",
        "Population",
        "AveOccup",
        "Latitude",
        "Longitude",
    ]
    TARGET_COL = "MedHouseVal"


    class TabularDataset(Dataset):
        def __init__(self, x, y):
            self.x = torch.from_numpy(x).float()
            self.y = torch.from_numpy(y).float().reshape(-1, 1)

        def __len__(self):
            return self.x.shape[0]

        def __getitem__(self, idx):
            return self.x[idx], self.y[idx]


    def setup_distributed():
        if "RANK" in os.environ and "WORLD_SIZE" in os.environ:
            dist.init_process_group(backend="nccl")
            rank = int(os.environ["RANK"])
            world_size = int(os.environ["WORLD_SIZE"])
        else:
            rank = 0
            world_size = 1
        local_rank = int(os.environ.get("LOCAL_RANK", "0"))
        torch.cuda.set_device(local_rank)
        return rank, world_size, local_rank


    def main():
        rank, world_size, local_rank = setup_distributed()
        device = torch.device("cuda", local_rank)

        ds = load_dataset("gvlassis/california_housing")
        train_ds = ds["train"]
        val_ds = ds["validation"]

        x_train = np.stack([train_ds[c] for c in FEATURE_COLS], axis=1)
        y_train = np.array(train_ds[TARGET_COL])
        x_val = np.stack([val_ds[c] for c in FEATURE_COLS], axis=1)
        y_val = np.array(val_ds[TARGET_COL])

        # Standardize features
        mean = x_train.mean(axis=0, keepdims=True)
        std = x_train.std(axis=0, keepdims=True) + 1e-6
        x_train = (x_train - mean) / std
        x_val = (x_val - mean) / std

        train_dataset = TabularDataset(x_train, y_train)
        val_dataset = TabularDataset(x_val, y_val)

        sampler = DistributedSampler(train_dataset, num_replicas=world_size, rank=rank, shuffle=True) if world_size > 1 else None
        train_loader = DataLoader(train_dataset, batch_size=512, shuffle=(sampler is None), sampler=sampler, num_workers=2)
        val_loader = DataLoader(val_dataset, batch_size=1024, shuffle=False, num_workers=2)

        model = nn.Sequential(
            nn.Linear(len(FEATURE_COLS), 128),
            nn.ReLU(),
            nn.Linear(128, 64),
            nn.ReLU(),
            nn.Linear(64, 1),
        ).to(device)

        if world_size > 1:
            model = torch.nn.parallel.DistributedDataParallel(model, device_ids=[local_rank])

        optimizer = torch.optim.AdamW(model.parameters(), lr=3e-3)
        loss_fn = nn.MSELoss()

        epochs = 20
        for epoch in range(epochs):
            if sampler is not None:
                sampler.set_epoch(epoch)
            model.train()
            for xb, yb in train_loader:
                xb = xb.to(device, non_blocking=True)
                yb = yb.to(device, non_blocking=True)
                pred = model(xb)
                loss = loss_fn(pred, yb)
                optimizer.zero_grad(set_to_none=True)
                loss.backward()
                optimizer.step()

            if rank == 0:
                model.eval()
                with torch.no_grad():
                    mse = 0.0
                    n = 0
                    for xb, yb in val_loader:
                        xb = xb.to(device, non_blocking=True)
                        yb = yb.to(device, non_blocking=True)
                        pred = model(xb)
                        mse += torch.sum((pred - yb) ** 2).item()
                        n += yb.numel()
                    rmse = (mse / n) ** 0.5
                    print(f"Epoch {epoch+1}/{epochs} - Val RMSE: {rmse:.4f}")

        if rank == 0:
            os.makedirs("/output/housing", exist_ok=True)
            torch.save({"state_dict": model.state_dict(), "mean": mean, "std": std}, "/output/housing/model.pt")
            print("Saved model to /output/housing/model.pt")

        if world_size > 1:
            dist.destroy_process_group()


    if __name__ == "__main__":
        start = time.time()
        main()
        if int(os.environ.get("RANK", "0")) == 0:
            print(f"Total training time: {time.time() - start:.1f}s")
---
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: housing-price-train
  namespace: training
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
          nodeSelector:
            cloud.google.com/gke-accelerator: "nvidia-tesla-a100"
          containers:
            - name: pytorch
              image: pytorch/pytorch:2.2.2-cuda12.1-cudnn8-runtime
              imagePullPolicy: IfNotPresent
              command: ["bash", "-lc"]
              args:
                - |
                  pip install -q datasets && \
                  torchrun --nproc_per_node=1 \
                    --nnodes=${WORLD_SIZE} \
                    --node_rank=${RANK} \
                    --master_addr=${MASTER_ADDR} \
                    --master_port=${MASTER_PORT} \
                    /workspace/train.py
              resources:
                limits:
                  cpu: "4"
                  memory: "16Gi"
                  nvidia.com/gpu: 1
              volumeMounts:
                - name: script
                  mountPath: /workspace
                - name: output
                  mountPath: /output
          volumes:
            - name: script
              configMap:
                name: housing-price-train-script
            - name: output
              emptyDir: {}
    Worker:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
          nodeSelector:
            cloud.google.com/gke-accelerator: "nvidia-tesla-a100"
          containers:
            - name: pytorch
              image: pytorch/pytorch:2.2.2-cuda12.1-cudnn8-runtime
              imagePullPolicy: IfNotPresent
              command: ["bash", "-lc"]
              args:
                - |
                  pip install -q datasets && \
                  torchrun --nproc_per_node=1 \
                    --nnodes=${WORLD_SIZE} \
                    --node_rank=${RANK} \
                    --master_addr=${MASTER_ADDR} \
                    --master_port=${MASTER_PORT} \
                    /workspace/train.py
              resources:
                limits:
                  cpu: "4"
                  memory: "16Gi"
                  nvidia.com/gpu: 1
              volumeMounts:
                - name: script
                  mountPath: /workspace
          volumes:
            - name: script
              configMap:
                name: housing-price-train-script
