apiVersion: v1
kind: Namespace
metadata:
  name: vllm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemotron-nano-vllm
  namespace: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nemotron-nano-vllm
  template:
    metadata:
      labels:
        app: nemotron-nano-vllm
    spec:
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "present"
          effect: "NoSchedule"
      nodeSelector:
        cloud.google.com/gke-accelerator: "nvidia-tesla-a100"
        node.kubernetes.io/instance-type: "a2-highgpu-2g"
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.17.1-cu130
          ports:
            - containerPort: 8000
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          command: ["bash", "-lc"]
          args:
            - |
              vllm serve nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16 \
                --served-model-name nemotron-3-nano-bf16 \
                --host 0.0.0.0 \
                --port 8000 \
                --dtype bfloat16 \
                --tensor-parallel-size 2 \
                --trust-remote-code \
                --gpu-memory-utilization 0.90 \
                --max-num-seqs 2 \
                --max-model-len 8192
          resources:
            limits:
              cpu: "8"
              memory: "64Gi"
              nvidia.com/gpu: 2
            requests:
              cpu: "4"
              memory: "32Gi"
              nvidia.com/gpu: 2
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: hf-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nemotron-nano-vllm
  namespace: vllm
spec:
  selector:
    app: nemotron-nano-vllm
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
