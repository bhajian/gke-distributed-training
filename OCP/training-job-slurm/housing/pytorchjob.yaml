apiVersion: v1
kind: Namespace
metadata:
  name: training
---
apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: housing-price-train
  namespace: training
  labels:
    kueue.x-k8s.io/queue-name: training-queue
spec:
  runPolicy:
    suspend: true
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
          nodeSelector:
            accelerator: "nvidia"
          containers:
            - name: pytorch
              image: ${IMAGE_REGISTRY}/${IMAGE_REPO}/housing-price-train:latest
              imagePullPolicy: Always
              command: ["python", "/workspace/train.py"]
              env:
                - name: EPOCHS
                  value: "20"
                - name: BATCH_SIZE
                  value: "256"
                - name: LR
                  value: "0.001"
              resources:
                limits:
                  cpu: "4"
                  memory: "16Gi"
                  nvidia.com/gpu: 1
                requests:
                  cpu: "2"
                  memory: "8Gi"
                  nvidia.com/gpu: 1
    Worker:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          tolerations:
            - key: "nvidia.com/gpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
          nodeSelector:
            accelerator: "nvidia"
          containers:
            - name: pytorch
              image: ${IMAGE_REGISTRY}/${IMAGE_REPO}/housing-price-train:latest
              imagePullPolicy: Always
              command: ["python", "/workspace/train.py"]
              env:
                - name: EPOCHS
                  value: "20"
                - name: BATCH_SIZE
                  value: "256"
                - name: LR
                  value: "0.001"
              resources:
                limits:
                  cpu: "4"
                  memory: "16Gi"
                  nvidia.com/gpu: 1
                requests:
                  cpu: "2"
                  memory: "8Gi"
                  nvidia.com/gpu: 1
